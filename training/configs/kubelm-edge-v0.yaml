# kubelm-edge v0 — initial SFT config
#
# Loaded by training/sft.py. Schema is intentionally flat: a future
# v2 with multi-stage training (SFT → DPO etc.) will introduce a
# nested form, but v0 is single-stage QLoRA SFT.
#
# Pin every reproducibility-relevant knob. PROJECT.md commitment #5
# says training is reproducible; that obligation lives here.
#
# Deployment target footprint (kubelm-edge tier, per ROADMAP Phase 6):
#   - Q4_K_M GGUF on disk: ~1.0 GB
#   - Working set at 8K context: ~1.5–1.7 GB (weights + KV cache + compute)
#   - K8s Pod resources: requests 1 cpu / 1.5Gi memory, limits 2 cpu / 2Gi
#   - Fits as a sidecar on the same node as the K8sGPT analyzer

base_model: Qwen/Qwen2.5-1.5B-Instruct
base_model_revision: main   # bump to a commit SHA before publication
                            # (commit pin is the actual reproducibility lever;
                            #  "main" here is a development placeholder)

# Tokenizer / chat template
chat_template: qwen        # Qwen2.5's bundled chat template handles tool_calls
                           # in the OpenAI shape our trajectories use
max_seq_length: 16384      # Trajectory char-length p99 over the v0 corpus
                           # is ~60 KB (~15K tokens at chars/4); 8K would
                           # silently right-truncate the conclusion (the
                           # training signal) on the long tail. 16K covers
                           # the tail with headroom and remains well within
                           # Qwen 2.5 1.5B's 32K native context.

# Dataset
dataset:
  format: jsonl
  sources:
    - data/seed/v0/gpt-5.4-2026-05-12.jsonl
    - data/seed/varied/v0/gpt-5.4-2026-05-12-varied.jsonl
    # negatives are deliberately excluded from v0 training because
    # 46/46 carry review_status: unreviewed and have templated
    # recovery prose. Re-add once they're hand-varied; see
    # data/seed/DATASET_CARD.md limitations.
    # - data/seed/varied/v0/negatives-2026-05-12.jsonl
  filter:
    # Train only on records the review process accepted. The mechanical
    # variants inherit the source's status so this also keeps the 290
    # variant records.
    provenance.review_status: [accepted, accepted_with_edits]
    quality.conclusion_rubric_passed: true
    quality.schema_passed: true
  shuffle_seed: 0xb1ab

# LoRA / QLoRA
lora:
  r: 32                      # higher rank for tool-use SFT helps;
                             # we can sweep this in Phase 5 step 2.
                             # For a 1.5B base, r=32 → ~30 MB adapter,
                             # ~2-3% of model params — well within the
                             # "specialize, don't replace" range.
  alpha: 64                  # 2× r is the unsloth default
  dropout: 0.0
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  bias: none
  task_type: CAUSAL_LM

quantization:
  load_in_4bit: true         # QLoRA — base model in 4-bit during training
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true

# Training loop
training:
  num_train_epochs: 3
  per_device_train_batch_size: 8         # 1.5B fits more samples per step;
                                         # bumped from 4 (the 3B-era setting)
  gradient_accumulation_steps: 2          # effective batch size = 16
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  optim: paged_adamw_8bit
  bf16: true
  fp16: false
  max_grad_norm: 1.0
  logging_steps: 5
  save_strategy: epoch
  save_total_limit: 3
  seed: 42
  # Assistant-only loss is wired up in training/sft.py via Unsloth's
  # `train_on_responses_only`, not via trl's SFTConfig kwarg. Unsloth's
  # compiled SFTTrainer wrapper ignores `assistant_only_loss` even when
  # set, so we leave it off here and rely on the post-trainer wrap.
  # The smoke-test (--smoke-test) verifies the mask ratio before any
  # paid run.

# Output (relative to --out passed on the CLI)
output:
  adapter_dir: adapter
  merged_dir: merged
  log_path: training_log.jsonl

# Reporting
report_to: []                # set to ["wandb"] when running for real;
                             # local dry-runs leave this off

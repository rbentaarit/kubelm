# Run on each commit with the project ruff version pinned to match CI.
# Install once after cloning:
#
#     uv run pre-commit install
#
# Run the hooks against the full tree (e.g., before opening a PR):
#
#     uv run pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        # 8 MB cap. Curated seed corpora under data/seed/ legitimately
        # carry full tool_result content per trajectory and grow with
        # variation pipelines. The K8sGPT MCP `analyze` and
        # `get-resource` responses are several KB each. A 5× variation
        # of the 29-seed v0 file already sits at ~4 MB. Larger corpora
        # belong on Hugging Face per the Phase 4 deliverable.
        args: [--maxkb=8192]

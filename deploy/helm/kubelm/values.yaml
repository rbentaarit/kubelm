# kubelm Helm chart values.
#
# kubelm is one CPU-only model family across a resource spectrum. Pick a
# tier by what the cluster can spare; each tier is the right-sized
# tool-use model for its bracket, not a downgrade of the one above.
#
# Tier presets (set `model` + `resources` to match). Serving RAM and
# per-step latency MEASURED on a real x86 Linux 2-core node (-ngl 0):
#   ultra-edge  Qwen3.5-0.8B  ~0.9GB RAM  ~16-32s/step  (unreleased; local only)
#   edge        Qwen2.5-1.5B  ~1.1GB RAM  ~20-40s/step  rbentaarit/kubelm-edge-v0
#   edge+       Qwen3.5-2B    ~1.6GB RAM  ~29-55s/step  rbentaarit/kubelm-edge-v0.3-GGUF  <-- DEFAULT
# RAM is NOT the gate: every tier fits a 4GB node (compact hybrid KV
# cache). Size mem = footprint + ~0.5GB headroom; cpu by latency
# tolerance (more cores -> faster, ~linear). See
# eval/results/summaries/cpu-latency-2026-05-29.json.

replicaCount: 1

model:
  # GGUF pulled from Hugging Face at pod start via llama.cpp's --hf-repo.
  # For air-gapped clusters, set cache.persistence + pre-seed the volume
  # and leave hfRepo empty, then pass model.localPath instead (see README).
  hfRepo: rbentaarit/kubelm-edge-v0.3-GGUF
  hfFile: kubelm-edge.Q4_K_M.gguf
  localPath: ""          # absolute path inside the container; overrides hfRepo if set
  # Name K8sGPT references when calling the endpoint.
  servedName: kubelm-edge

server:
  image:
    repository: ghcr.io/ggml-org/llama.cpp
    tag: server
    pullPolicy: IfNotPresent
  port: 8080
  # Context window. Sized generously: long multi-step trajectories can
  # accumulate context, and a too-small -c turns a long run into an
  # HTTP 400 (see PROJECT.md bench serving-validity note). Match or
  # exceed the model's training max_seq_length (v0.3 = 16384).
  contextSize: 16384
  # Threads default to resources.limits.cpu (whole cores) so the server
  # is never CFS-throttled by its own cgroup. Set explicitly to override.
  threads: null
  # kubelm models are no-think trained. Disable thinking server-side so
  # every client gets the deployment behavior — K8sGPT does not send the
  # enable_thinking chat_template_kwarg itself, and leaving thinking on
  # produces longer, slower generations on CPU.
  disableThinking: true
  extraArgs: []

# Defaults = edge+ tier (2B). Right-sized to the MEASURED serving
# footprint (~1.6GB at -c16384) + compute headroom — not the old 8GB
# guess. cpu=4 for reasonable per-step latency (~½ the time of 2 cores);
# drop to 2 for the smallest nodes (still works, ~29-55s/step).
resources:
  requests:
    cpu: "2"
    memory: 2Gi
  limits:
    cpu: "4"
    memory: 3Gi

service:
  type: ClusterIP
  port: 8080

# Restrict the model endpoint to K8sGPT pods only (proposes, never
# exposed broadly). Off by default; enable in shared clusters.
networkPolicy:
  enabled: false
  k8sgptPodSelector:
    matchLabels:
      app.kubernetes.io/name: k8sgpt

# HF download cache. emptyDir by default (re-downloads on pod restart);
# set persistence.enabled for a PVC that survives restarts / air-gap.
cache:
  persistence:
    enabled: false
    storageClass: ""
    size: 4Gi
  emptyDir:
    medium: ""           # "" = node disk; "Memory" = tmpfs
    sizeLimit: 4Gi

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}

# --- Turnkey "query K8sGPT, kubelm investigates" loop ---
# With the model server above, enabling both of these makes the chart a
# self-contained install: K8sGPT runs its MCP server in-cluster, and the
# agent drives kubelm through those tools. Disabled by default — the base
# chart ships just the model server (point an external K8sGPT at it).

# K8sGPT MCP server (the canonical tool surface; kubelm never reimplements it).
k8sgpt:
  enabled: false
  image:
    repository: ghcr.io/k8sgpt-ai/k8sgpt
    tag: v0.4.32              # pinned: the version kubelm was trained/evaluated against
    pullPolicy: IfNotPresent
  port: 8089
  # --backend selects the provider from the mounted config (serve else
  # defaults to 'openai' and fails the startup check).
  args: [serve, --mcp, --mcp-http, --mcp-port, "8089", --backend, customrest]
  # K8sGPT requires an AI provider at startup; point it at kubelm. The
  # agent drives the MCP tools regardless, so this is just to satisfy serve.
  backend: customrest
  resources:
    requests: {cpu: "100m", memory: 128Mi}
    limits: {cpu: "1", memory: 512Mi}

# Agent loop: thin service driving kubelm through K8sGPT's MCP tools.
# Image is built locally + `kind load docker-image` for now (see the
# deployment guide); not yet published to a registry.
agent:
  enabled: false
  image:
    repository: kubelm-agent
    tag: dev
    pullPolicy: IfNotPresent  # kind-loaded image; do not pull from a registry
  maxSteps: 16
  requestTimeout: 600         # per-step HTTP timeout to kubelm (CPU inference is slow)
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests: {cpu: "100m", memory: 128Mi}
    limits: {cpu: "500m", memory: 256Mi}

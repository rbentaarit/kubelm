{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubelm.fullname" . }}-agent
  labels:
    {{- include "kubelm.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "kubelm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        {{- include "kubelm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
    spec:
      containers:
        - name: agent
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: KUBELM_BACKEND_URL
              value: "http://{{ include "kubelm.fullname" . }}:{{ .Values.service.port }}/v1"
            - name: KUBELM_MODEL
              value: {{ .Values.model.servedName | quote }}
            - name: K8SGPT_MCP_URL
              value: "http://{{ include "kubelm.fullname" . }}-k8sgpt:{{ .Values.k8sgpt.port }}/mcp"
            - name: MAX_STEPS
              value: {{ .Values.agent.maxSteps | quote }}
            - name: REQUEST_TIMEOUT
              value: {{ .Values.agent.requestTimeout | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubelm.fullname" . }}-agent
  labels:
    {{- include "kubelm.labels" . | nindent 4 }}
spec:
  type: {{ .Values.agent.service.type }}
  selector:
    {{- include "kubelm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: agent
  ports:
    - name: http
      port: {{ .Values.agent.service.port }}
      targetPort: http
{{- end }}

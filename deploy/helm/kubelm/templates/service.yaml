apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubelm.fullname" . }}
  labels:
    {{- include "kubelm.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "kubelm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: model
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP

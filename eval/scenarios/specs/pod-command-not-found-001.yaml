id: pod-command-not-found-001
profile: base
description: |
  A Pod whose container's `command` points to an executable that
  doesn't exist in the image's filesystem (`/bin/notexist`). The
  container runtime fails to start the process with exit code 127
  (the conventional "command not found" exit code) and surfaces
  the failure as `RunContainerError` with a message about no such
  file or directory. kubelet restarts the container, hits
  CrashLoopBackOff.

  Distinct from pod-crashloop-001 (which runs a real command that
  exits 1 — the container starts and the script exits). Here the
  container never starts at all — the failure is at exec time,
  before any user-process output. The model has to read either
  the container status / events to see the RunContainerError, or
  the container spec to see the obviously-wrong command path.
  A model that only fetches container logs sees nothing (no
  process ever wrote any).

goal: "Why is api-pod in scenario-pod-command-not-found-001 in CrashLoopBackOff?"

setup:
  - apply_inline: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: scenario-pod-command-not-found-001
      ---
      apiVersion: v1
      kind: Pod
      metadata:
        name: api-pod
        namespace: scenario-pod-command-not-found-001
        labels: { app: api }
      spec:
        restartPolicy: Always
        containers:
          - name: app
            image: busybox:1.36
            command: ["/bin/notexist"]

settle:
  - wait_for_status:
      kind: Pod
      namespace: scenario-pod-command-not-found-001
      name: api-pod
      reason: CrashLoopBackOff
      timeout: 120s

expected:
  reference_calls:
    must_include: []
    any_of:
      - { name: analyze, args_match: {} }
      - { name: get-resource, args_match: { resourceType: pod, name: api-pod } }
      - { name: list-resources, args_match: { resourceType: pod } }
      - { name: list-resources, args_match: { resourceType: pods } }
      - { name: list-events, args_match: {} }
    forbidden: []
  conclusion_rubric:
    # Slot 1: must surface either the exec failure shape (exec
    # format error / no such file / command not found / RunContainerError)
    # OR the specific command path. Catches generic "container
    # failed" answers.
    # Slot 2: must surface either the binary that wasn't found
    # OR the command field. Proves the model read the spec.
    must_mention:
      - ["no such file", "not found", "RunContainerError", "executable", "exec", "OCI runtime", "starting container", "cannot find", "command not found"]
      - ["/bin/notexist", "notexist", "command", "binary"]
    must_not_mention: []
    semantic_intent: |
      Identifies that the container's command `/bin/notexist` is
      not present in the busybox image, so the container runtime
      cannot start the process. kubelet's retry produces
      CrashLoopBackOff. The fix is to point command at a real
      binary in the image (or use a different image that contains
      the binary).

id: service-account-missing-001
profile: base
description: |
  A Deployment whose Pod template references a ServiceAccount
  (`api-runner`) that doesn't exist in the namespace. Direct Pod
  apply with a missing SA is rejected at admission, so the Pod
  never appears; the Deployment's ReplicaSet keeps trying to
  create the Pod and the failure surfaces through Events on the
  ReplicaSet ("FailedCreate: error looking up service account
  ... not found"). The Deployment never reaches Available.

  Distinct from rbac-denied-001 (which tests a real SA whose Role
  doesn't grant the operation the workload tries) and from
  secret-missing / configmap-missing (env/volume references).
  The model has to either read the Pod-template's
  `serviceAccountName` field on the Deployment or watch the
  ReplicaSet events to see why no Pod is being created.

goal: "Why is the api Deployment in scenario-service-account-missing-001 not creating any Pods?"

setup:
  - apply_inline: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: scenario-service-account-missing-001
      ---
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api
        namespace: scenario-service-account-missing-001
      spec:
        replicas: 1
        progressDeadlineSeconds: 60
        selector:
          matchLabels: { app: api }
        template:
          metadata:
            labels: { app: api }
          spec:
            serviceAccountName: api-runner   # no SA of this name exists
            containers:
              - name: app
                image: nginx:1.27-alpine

settle:
  # Wait for the Deployment to confirm it's been observed — the
  # ReplicaSet will then have made at least one failed Pod-create
  # attempt and the SA-not-found event will be visible. Deployments
  # have no phase; Progressing is True while any reconciliation is
  # actively happening (including failed-create retries).
  - wait_for_status:
      kind: Deployment
      namespace: scenario-service-account-missing-001
      name: api
      condition: Progressing
      timeout: 60s

expected:
  reference_calls:
    must_include: []
    any_of:
      - { name: list-resources, args_match: { resourceType: deployments } }  # ref_calls v2
      - { name: list-resources, args_match: { resourceType: deployment } }  # ref_calls v2
      - { name: analyze, args_match: {} }
      - { name: get-resource, args_match: { resourceType: deployment, name: api } }
      - { name: list-events, args_match: {} }
      - { name: list-resources, args_match: { resourceType: replicasets } }
      - { name: list-resources, args_match: { resourceType: serviceaccounts } }
    forbidden: []
  conclusion_rubric:
    # Slot 1: must name the ServiceAccount concept.
    # Slot 2: must surface the specific SA name or the "not found"
    # phrasing — proves the model navigated from the symptom
    # ("no pods created") to the actual cause (SA reference).
    must_mention:
      - ["serviceaccount", "ServiceAccount", "service account"]
      - ["api-runner", "not found", "doesn't exist", "does not exist", "missing"]
    must_not_mention: []
    semantic_intent: |
      Identifies that the Deployment's Pod template references
      ServiceAccount `api-runner`, which doesn't exist in the
      namespace; admission therefore rejects every Pod-creation
      attempt from the ReplicaSet and the Deployment cannot make
      progress. The fix is to create the SA or change the template
      to reference an existing one.

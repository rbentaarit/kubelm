id: image-pull-001
profile: base
description: |
  A Pod referencing a registry/image:tag that does not exist. The kubelet
  retries pulling and ultimately settles into ImagePullBackOff.

goal: "Why is the bad-image pod in scenario-image-pull-001 stuck?"

setup:
  - apply_inline: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: scenario-image-pull-001
      ---
      apiVersion: v1
      kind: Pod
      metadata:
        name: bad-image
        namespace: scenario-image-pull-001
      spec:
        containers:
          - name: app
            image: ghcr.io/kubelm/this-image-does-not-exist:v1.2.3

settle:
  - wait_for_status:
      kind: Pod
      namespace: scenario-image-pull-001
      name: bad-image
      reason: ImagePullBackOff
      timeout: 120s

expected:
  # Retrofit 2026-05-11: list-resources(pods) moved from must_include
  # to any_of because K8sGPT MCP accepts both `pod` and `pods`
  # resourceType values; AND-semantics of must_include can't express
  # "either singular or plural". any_of also covers get-resource and
  # list-events as equally valid first calls.
  reference_calls:
    must_include: []
    any_of:
      - { name: list-resources, args_match: { resourceType: pods } }
      - { name: list-resources, args_match: { resourceType: pod } }
      - { name: get-resource, args_match: { resourceType: pod, name: bad-image } }
      - { name: list-events,  args_match: { involvedObjectName: bad-image } }
    forbidden: []
  conclusion_rubric:
    must_mention: ["ImagePullBackOff", "bad-image"]
    must_not_mention: []
    semantic_intent: |
      Identifies the pod, names the failure mode (ImagePullBackOff or
      ErrImagePull), and references the missing image as the cause.

id: rbac-denied-001
profile: base
description: |
  A Pod uses a ServiceAccount with no RBAC bindings and tries to list pods
  via the in-cluster API. Each invocation fails with "Forbidden" and the
  pod restarts in a CrashLoopBackOff with the RBAC denial in its logs.

goal: "Why is the rbac-probe pod in scenario-rbac-denied-001 failing?"

setup:
  - apply_inline: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: scenario-rbac-denied-001
      ---
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: no-perms-sa
        namespace: scenario-rbac-denied-001
      ---
      apiVersion: v1
      kind: Pod
      metadata:
        name: rbac-probe
        namespace: scenario-rbac-denied-001
      spec:
        serviceAccountName: no-perms-sa
        restartPolicy: Always
        containers:
          - name: probe
            image: curlimages/curl:8.10.1
            command: ["/bin/sh", "-c"]
            args:
              - |
                TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                STATUS=$(curl -sS -o /tmp/body -w "%{http_code}" \
                    --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                    -H "Authorization: Bearer $TOKEN" \
                    https://kubernetes.default.svc/api/v1/namespaces/kube-system/pods)
                cat /tmp/body
                if [ "$STATUS" = "403" ]; then
                    echo "RBAC denied: Forbidden (HTTP $STATUS)"
                    exit 1
                fi

settle:
  - wait_for_status:
      kind: Pod
      namespace: scenario-rbac-denied-001
      name: rbac-probe
      reason: CrashLoopBackOff
      timeout: 120s

expected:
  reference_calls:
    must_include:
      - { name: list-resources, args_match: { resourceType: pods } }
    any_of:
      - { name: get-logs,    args_match: { podName: rbac-probe } }
      - { name: list-events, args_match: { involvedObjectName: rbac-probe } }
    forbidden: []
  conclusion_rubric:
    must_mention: ["rbac-probe", "Forbidden"]
    must_not_mention: []
    semantic_intent: |
      Identifies the pod, recognizes the Forbidden / RBAC denial in
      logs, and points to the missing RoleBinding for no-perms-sa.

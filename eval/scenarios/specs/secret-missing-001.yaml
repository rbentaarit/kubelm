id: secret-missing-001
profile: base
description: |
  A Pod references a Secret via envFrom that does not exist in the
  namespace. The container fails to create with CreateContainerConfigError
  every retry; kubelet does not move past container creation.

goal: "Why does env-pod in scenario-secret-missing-001 not start?"

setup:
  - apply_inline: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: scenario-secret-missing-001
      ---
      apiVersion: v1
      kind: Pod
      metadata:
        name: env-pod
        namespace: scenario-secret-missing-001
      spec:
        containers:
          - name: app
            image: busybox:1.36
            command: [sh, -c, 'env; sleep 3600']
            envFrom:
              - secretRef:
                  name: missing-secret

settle:
  - wait_for_status:
      kind: Pod
      namespace: scenario-secret-missing-001
      name: env-pod
      reason: CreateContainerConfigError
      timeout: 60s

expected:
  # Retrofit 2026-05-11: list-resources(pods) moved to any_of with
  # singular `pod` form added (K8sGPT MCP accepts both).
  reference_calls:
    must_include: []
    any_of:
      - { name: list-resources, args_match: { resourceType: pods } }
      - { name: list-resources, args_match: { resourceType: pod } }
      - { name: get-resource, args_match: { resourceType: pod, name: env-pod } }
      - { name: list-events,  args_match: { involvedObjectName: env-pod } }
    forbidden: []
  conclusion_rubric:
    must_mention: ["env-pod", "missing-secret"]
    must_not_mention: []
    semantic_intent: |
      Identifies the pod, names the failure (CreateContainerConfigError
      or "couldn't find Secret"), and points to the missing Secret as
      the cause.

id: node-selector-unschedulable-001
profile: base
description: |
  A Pod has a nodeSelector that no node in the cluster satisfies. The Pod
  is stuck in Pending phase indefinitely; the scheduler emits an
  Unschedulable Event explaining the mismatch.

goal: "Why is picky-pod in scenario-node-selector-unschedulable-001 not running?"

setup:
  - apply_inline: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: scenario-node-selector-unschedulable-001
      ---
      apiVersion: v1
      kind: Pod
      metadata:
        name: picky-pod
        namespace: scenario-node-selector-unschedulable-001
      spec:
        nodeSelector:
          specialty: unobtanium
        containers:
          - name: app
            image: nginx:1.27-alpine

settle:
  - wait_for_status:
      kind: Pod
      namespace: scenario-node-selector-unschedulable-001
      name: picky-pod
      phase: Pending
      timeout: 30s

expected:
  # Retrofit 2026-05-11: list-resources(pods) moved to any_of and
  # singular form added (K8sGPT MCP accepts both `pod` and `pods`).
  reference_calls:
    must_include: []
    any_of:
      - { name: analyze, args_match: { namespace: scenario-node-selector-unschedulable-001 } }  # ref_calls v2: credit canonical analyze
      - { name: list-resources, args_match: { resourceType: pods } }
      - { name: list-resources, args_match: { resourceType: pod } }
      - { name: list-events }
      - { name: get-resource, args_match: { resourceType: pod, name: picky-pod } }
    forbidden: []
  conclusion_rubric:
    must_mention:
      - "picky-pod"
      - ["Pending", "unschedulable"]
    must_not_mention: []
    semantic_intent: |
      Identifies the pod, recognizes the unschedulable state, and ties
      it back to the nodeSelector / unsatisfiable label requirement.

id: pod-insufficient-cpu-001
profile: base
description: |
  A Pod that requests 100 CPUs — orders of magnitude more than any
  kind node can offer. The scheduler emits `FailedScheduling` with
  the message "0/1 nodes are available: 1 Insufficient cpu"; the
  Pod stays Pending forever.

  Tests a scheduling failure mode the other v0.1 scheduling
  scenarios don't cover. node-selector-unschedulable matches no
  candidate node by label; taint-no-toleration matches by label
  but is rejected by a taint; this scenario matches by label AND
  has no taint problem — the node simply doesn't have the capacity
  to host the Pod. Distinct failure message, distinct fix (reduce
  the request, scale up the cluster, or split the workload).

goal: "Why is heavy-pod in scenario-pod-insufficient-cpu-001 stuck Pending?"

setup:
  - apply_inline: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: scenario-pod-insufficient-cpu-001
      ---
      apiVersion: v1
      kind: Pod
      metadata:
        name: heavy-pod
        namespace: scenario-pod-insufficient-cpu-001
        labels: { app: heavy }
      spec:
        containers:
          - name: app
            image: nginx:1.27-alpine
            resources:
              requests:
                cpu: "100"   # 100 cores — no kind node will have this

settle:
  # Wait for the scheduler to actually report the CPU shortage, not just
  # for the Pod to be Pending. On a fresh kind cluster the control-plane
  # node starts NotReady, so the scheduler's FIRST verdict is "untolerated
  # taint node.kubernetes.io/not-ready" — and that stale message lingers
  # in the PodScheduled condition after the node goes Ready and the taint
  # clears. phase=Pending settles instantly, inside that race window, so
  # every model (incl. gpt-5.4 / qwen2.5:32b) saw the taint and concluded
  # the wrong root cause. message_contains forces the wait until the
  # scheduler has re-evaluated against the Ready node and written the
  # intended "Insufficient cpu" verdict. The verdict lives in a
  # PodScheduled condition with status=False, which neither `reason` nor
  # `condition` (status==True) can match — hence message_contains.
  - wait_for_status:
      kind: Pod
      namespace: scenario-pod-insufficient-cpu-001
      name: heavy-pod
      message_contains: "Insufficient cpu"
      timeout: 120s

expected:
  reference_calls:
    must_include: []
    any_of:
      - { name: analyze, args_match: { namespace: scenario-pod-insufficient-cpu-001 } }
      - { name: get-resource, args_match: { resourceType: pod, name: heavy-pod, namespace: scenario-pod-insufficient-cpu-001 } }
      - { name: list-events, args_match: { namespace: scenario-pod-insufficient-cpu-001 } }
      # list-resources(pods) is also a valid first call — it returns
      # each pod's status (including .status.conditions and the
      # scheduler's message) and the spec (so the CPU request is
      # visible). qwen2.5:32b chose this path and got the right
      # answer fully grounded.
      - { name: list-resources, args_match: { resourceType: pods, namespace: scenario-pod-insufficient-cpu-001 } }
    forbidden: []
  conclusion_rubric:
    # Slot 1: must surface CPU specifically as the constrained
    # resource. Generic "resources" / "capacity" was too loose in
    # the first draft — a model that hallucinated a taint failure
    # passed by saying "resources". The fix forces "cpu" to appear.
    # Slot 2: must surface the specific request value (100 / 100
    # cores / cpu: "100"). Proves the model actually read the Pod
    # spec from a tool result instead of guessing from the scenario
    # name. "request" alone is too generic (any scheduling problem
    # mentions requests).
    must_mention:
      - ["Insufficient cpu", "insufficient CPU", "not enough cpu", "not enough CPU", "exceeds", "cpu capacity", "CPU capacity"]
      - [
          "100 CPU",
          "100 cpu",
          "100 cores",
          "100 vCPU",
          "cpu: \"100\"",
          "cpu: '100'",
          "cpu: 100",
          "request of 100",
          "request: 100",
          "requests: 100",
          "requests.cpu: 100",
          "of `100`",
          "100`",
          "100\"",
        ]
    must_not_mention: []
    semantic_intent: |
      Recognizes that heavy-pod cannot be scheduled because its CPU
      request (100 cores) exceeds the capacity of any node in the
      cluster. The fix is to reduce the request to a value the
      cluster can satisfy.

id: pod-crashloop-001
profile: base
description: |
  A Pod whose container prints a startup error and exits 1 immediately,
  triggering kubelet's restart loop until kubelet declares CrashLoopBackOff.

goal: "Why is the crash-pod in the scenario-pod-crashloop-001 namespace failing?"

setup:
  - apply_inline: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: scenario-pod-crashloop-001
      ---
      apiVersion: v1
      kind: Pod
      metadata:
        name: crash-pod
        namespace: scenario-pod-crashloop-001
        labels: { app: crash-pod }
      spec:
        restartPolicy: Always
        containers:
          - name: app
            image: busybox:1.36
            command:
              - sh
              - -c
              - 'echo "startup failed: missing CONFIG_PATH"; exit 1'

settle:
  - wait_for_status:
      kind: Pod
      namespace: scenario-pod-crashloop-001
      name: crash-pod
      reason: CrashLoopBackOff
      timeout: 90s

expected:
  # Retrofit 2026-05-11: list-resources(pods) moved from must_include
  # to any_of so the singular form `pod` is also accepted (K8sGPT
  # MCP takes both).
  reference_calls:
    must_include: []
    any_of:
      - { name: analyze, args_match: { namespace: scenario-pod-crashloop-001 } }  # ref_calls v2: credit canonical analyze
      - { name: list-resources, args_match: { resourceType: pods } }
      - { name: list-resources, args_match: { resourceType: pod } }
      - { name: get-logs,     args_match: { podName: crash-pod } }
      - { name: list-events,  args_match: { involvedObjectName: crash-pod } }
    forbidden: []
  conclusion_rubric:
    # 2026-05-19 validation fix: slot 1 broadened from the exact
    # string "CrashLoopBackOff" to accept the back-off phrasing.
    # qwen2.5:7b diagnosed the root cause correctly (missing
    # CONFIG_PATH -> startup failure -> "back-off restarts") but
    # reached it via list-events + get-logs without a get-resource
    # call, so it never echoed the literal status string. Per
    # CLAUDE.md validation step 4 (broaden when the conclusion is
    # substantively right). All synonyms are tool-derivable: the
    # "Back-off restarting failed container" event text carries the
    # back-off wording.
    must_mention:
      - ["CrashLoopBackOff", "back-off", "backoff", "back off"]
      - "crash-pod"
    # 2026-05-19 v0.1 Stage 4a: forbid K8s vocabulary used
    # counterfactually from priors. Stage 2's audit surfaced v0
    # writing "it was not a benign failure like `FailedPreemption`,
    # `ResourceExhausted`" — these terms aren't in any tool result
    # and aren't load-bearing for the diagnosis (the actual cause is
    # the startup-error exit code in logs). A grounded conclusion
    # names the real cause, not things-it-isn't from training priors.
    must_not_mention:
      - FailedPreemption
      - ResourceExhausted
    semantic_intent: |
      Identifies the pod, names the failure mode (CrashLoopBackOff),
      and references the startup-error log line as the cause.

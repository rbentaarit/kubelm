name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Tests that spawn kind / k8sgpt / ollama are gated behind
# `pytest --integration` (see tests/conftest.py) and are NOT run here.
# CI covers the unit-test surface only.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Format check (ruff format)
        run: uv run ruff format --check

      - name: Run unit tests
        run: uv run pytest -q
